services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdam_app
    ports:
      - "8088:80"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
      - sqlite_data:/var/www/html/database
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/html/database/database.sqlite
    restart: unless-stopped

volumes:
  sqlite_data:
